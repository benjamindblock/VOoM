[tools]
lua = "latest"
stylua = "latest"
lua-language-server = "latest"
tree-sitter = "latest"

[tasks.fmt]
description = "Format all Lua files with StyLua"
run = "stylua lua/ plugin/ test/"

[tasks.fmt-check]
description = "Check Lua formatting without modifying files (useful in CI)"
run = "stylua --check lua/ plugin/ test/"
